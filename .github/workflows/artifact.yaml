name: Artifact Demo

on: [push]

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Create file
        run: echo "hello world" > file.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-file
          path: file.txt

  job2:
    runs-on: ubuntu-latest
    needs: job1

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: my-file

      - name: Read file
        run: cat file.txt